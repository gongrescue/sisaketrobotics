# ═══════════════════════════════════════════════════════════════════
# DigitalOcean App Platform Spec — Sisaket Robotics 2026
# Docs: https://docs.digitalocean.com/products/app-platform/reference/app-spec/
#
# วิธีใช้:
#   1) ตั้งค่า secrets ใน DO Dashboard: JWT_SECRET, MONGODB_URI
#   2) Create App → From GitHub → เลือก repo gongrescue/sisaketrobotics
#   3) DO จะอ่านไฟล์นี้อัตโนมัติ (หรือใช้ CLI: doctl apps create --spec .do/app.yaml)
# ═══════════════════════════════════════════════════════════════════

name: sisaket-robotics
# ภูมิภาคที่ใกล้ประเทศไทย: sgp (สิงคโปร์)
region: sgp

# Auto-deploy เมื่อ push ขึ้น main
services:
  - name: api
    # Build จาก Dockerfile ที่ root ของ repo (รวม backend + frontend)
    dockerfile_path: Dockerfile

    github:
      repo: gongrescue/sisaketrobotics
      branch: main
      deploy_on_push: true

    # ขนาด instance เริ่มต้น (basic-xxs = $5/เดือน, เพียงพอสำหรับระบบคะแนนงาน)
    instance_size_slug: basic-xxs
    instance_count: 1

    http_port: 5000
    # ต้อง catch ทุก path เพราะ backend serve frontend SPA ด้วย
    routes:
      - path: /

    health_check:
      http_path: /api/health
      initial_delay_seconds: 30
      period_seconds: 15
      timeout_seconds: 5
      failure_threshold: 3
      success_threshold: 1

    envs:
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: PORT
        scope: RUN_AND_BUILD_TIME
        value: "5000"
      - key: JWT_EXPIRES_IN
        scope: RUN_TIME
        value: 24h

      # FRONTEND_URL ใช้ตัวแปรในตัวของ App Platform — URL ปัจจุบันของ app
      - key: FRONTEND_URL
        scope: RUN_TIME
        value: ${APP_URL}

      # ─── SECRETS — ต้องตั้งใน DO Dashboard (ห้าม commit ค่า plaintext ในไฟล์นี้) ───
      # ไม่ได้ระบุใน spec เพราะ DO Spec Validator ปฏิเสธ SECRET ที่มีค่า plaintext
      # วิธีตั้ง:
      #   Dashboard → App → Settings → App-Level Environment Variables → Edit
      #   เพิ่ม 2 ตัว (เลือก Encrypt ทั้งคู่):
      #     - MONGODB_URI = mongodb+srv://USER:PASS@cluster.xxxx.mongodb.net/sisaket_robotics
      #     - JWT_SECRET  = (openssl rand -hex 32)

# ─── Alerts ───────────────────────────────────────────────────────
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

# ─── Ingress ──────────────────────────────────────────────────────
ingress:
  rules:
    - match:
        path:
          prefix: /
      component:
        name: api
