name: CI

# รันทุก PR และ push เข้า main เพื่อตรวจสอบก่อน deploy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: install + syntax check ──────────────────────────
  backend-check:
    name: Backend · lint & syntax
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check server.js
        run: node --check server.js

      - name: Syntax check all routes
        run: |
          find routes middleware models config -name "*.js" -print0 \
            | xargs -0 -n1 node --check

      - name: Check npm audit (high/critical only)
        run: npm audit --audit-level=high || true

  # ── Frontend: minimal HTML/JS validation ─────────────────────
  frontend-check:
    name: Frontend · syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: JS syntax check
        run: |
          find frontend/js -name "*.js" -print0 \
            | xargs -0 -n1 node --check

      - name: Verify index.html exists
        run: test -f frontend/index.html && echo "✅ frontend/index.html"

  # ── Docker: build image เพื่อยืนยันว่า Dockerfile ใช้งานได้ ──
  docker-build:
    name: Docker · build image
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: sisaket-robotics:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test image starts
        run: |
          # รัน container ด้วย env หลอก แล้วเช็คว่า process เริ่มได้
          # (จะ fail ตอนเชื่อม DB — เพียงพอแล้วถ้าถึงตรงนั้น)
          docker run --rm -d --name ssk-ci \
            -e MONGODB_URI=mongodb://127.0.0.1:27017/test \
            -e JWT_SECRET=ci_test_secret_at_least_32_characters_long \
            -e PORT=5000 \
            -p 5000:5000 \
            sisaket-robotics:ci
          sleep 5
          docker logs ssk-ci | head -20
          docker stop ssk-ci || true
